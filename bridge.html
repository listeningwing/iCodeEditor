    function appendLiveData(newData) {
      const textarea = document.getElementById('dataLog');
      textarea.value += newData;
      textarea.scrollTop = textarea.scrollHeight;
    };
    
    function decodeBase64Unicode(base64String) {
        var binaryString = base64String;
        try {
          binaryString = atob(base64String);
          const bytes = Uint8Array.from(binaryString, (char) => char.charCodeAt(0));
          return new TextDecoder().decode(bytes);
        } catch (e) { //The string contains invalid characters.
            //console.error("decodeBase64Unicode:", e);
        }
        return binaryString;
    };

    //a. call iCodeEditor without waiting
    function requestNoWaiting(req) {
         window.webkit.messageHandlers.nativeHandler.postMessage(req);
    };
    
    //b. call iCodeEditor and return an object
    async function requestWaitingData(req) {
		try {
			const string = await window.webkit.messageHandlers.fetchDataHandler.postMessage(req);
			//appendLiveData(string);
			var obj = JSON.parse(string);
			console.log("Object from iCodeEditor:", obj);
			console.log("msgtype from iCodeEditor:", obj.msgtype);
		} catch (e) {
			console.error("fetchDataHandler threw an error:", e);
		}
        return obj;
    };
